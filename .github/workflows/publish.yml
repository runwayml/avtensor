name: Publish to PyPI

# Publishes the source distribution when a GitHub release is published.
# Only an sdist is uploaded: wheels link against a specific torch and FFmpeg,
# so PyPI's manylinux requirement cannot be met without vendoring FFmpeg
# (see the License section of the README). Users build from source against
# their own torch/FFmpeg, as documented in Installation.
#
# Authentication uses PyPI trusted publishing (OIDC) — no API token. The
# PyPI project must be configured with this repo, this workflow file, and
# the `pypi` GitHub environment as a trusted publisher.

on:
  release:
    types: [published]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: [ci]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@f94ec6bedd8674c4426838e6b50417d36b6ab231 # v5.3.1

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(grep -Po '(?<=^version = ")[^"]+' Cargo.toml | head -1)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $VERSION"
            exit 1
          fi

      - name: Build sdist
        run: uvx --from 'maturin>=1.9,<2.0' maturin sdist -o dist/

      - name: Check metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
